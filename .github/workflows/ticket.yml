name: 'Vérification de la référence au ticket dans la PR'

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-ticket:
    runs-on: ubuntu-latest
    steps:
      - name: 'Vérifier le titre et la branche de la PR pour une référence au ticket'
        run: |
          set -e

          PR_TITLE="${{ github.event.pull_request.title }}"
          BRANCH_NAME="${{ github.head_ref }}"

          echo "Titre de PR : $PR_TITLE"
          echo "Nom de branche : $BRANCH_NAME"

          # Autoriser dev et main sans numéro d'issue
          if [[ "$BRANCH_NAME" == "dev" ]] || [[ "$BRANCH_NAME" == "main" ]]; then
            echo "✅ PR depuis $BRANCH_NAME, pas besoin de référence à l'issue"
            exit 0
          fi

          # Regex pour le titre PR : type(nom): Fixes #<num> - message
          TITLE_REGEX='^(feat|feature|fix|docs|chore|refactor|test|hotfix)\([a-zA-Z0-9_-]+\): [Ff]ixes #[0-9]+ - .+'
          if [[ "$PR_TITLE" =~ $TITLE_REGEX ]]; then
            echo "✅ Titre de PR valide avec référence au ticket"
            exit 0
          fi

          # Regex pour le nom de branche : feat/123-description, feature/123-description, fix/123-description, hotfix/123-description
          if [[ "$BRANCH_NAME" =~ ^(feat|feature|fix|hotfix)/[0-9]+-.+ ]]; then
            echo "✅ Nom de branche valide avec référence au ticket"
            exit 0
          fi

          echo "❌ Aucune référence valide au ticket trouvée !"
          echo "Le titre de la PR doit être au format : type(nom): Fixes #<num> - message"
          echo "Exemple de nom de branche valide : feature/123-description"
          echo "OU la PR doit provenir de dev ou main"
          exit 1
